<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Alternative OS Database</title>

    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>Alternative OS Database</h1>
            <p class="subtitle">A curated <strong style="color: red">WORK IN PROGRESS</strong> list of notable alternative free operating systems. </p>
        </header>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search or use terms like license:gpl or -family:bsd.">
        </div>

        <div class="table-container">
            <table id="osTable">
                <thead>
                    <tr>
                        <th style="width: 50px;">Icon</th>
                        <th onclick="sortTable('name')">OS Name ⇵</th>
                        <th onclick="sortTable('family')">Family ⇵</th>
                        <th onclick="sortTable('purpose')">Purpose ⇵</th>
                        <th>Latest release</th>
                        <th onclick="sortTable('releaseDate')">Rel. Date ⇵</th>
                        <th onclick="sortTable('license')">License ⇵</th>
                        <th onclick="sortTable('cost')">Cost ⇵</th>
                        <th>Links</th>
                    </tr>
                </thead>

                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>
</body>
</html>
